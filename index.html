function loadHistory() {

    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) h = JSON.parse(raw) || {};
    else {
      const old = localStorage.getItem(STORAGE_KEY);
      if (old) { const d = JSON.parse(old); if (d?.date && Array.isArray(d.entries)) h = { [d.date]: d.entries }; }
    }
    if (!localStorage.getItem(SEED_FLAG)) {
      if (!h["2026-04-13"] || h["2026-04-13"].length === 0) {

      }
      localStorage.setItem(SEED_FLAG, "1");
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h));

  } catch { return {}; }
}
function saveHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
function loadFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch { return []; } }
function saveFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }
function loadGoals() { try { const raw = localStorage.getItem(GOALS_KEY); if (!raw) return { ...DEFAULT_GOALS }; const p = JSON.parse(raw); return { calories: p.calories ?? DEFAULT_GOALS.calories, protein: p.protein ?? DEFAULT_GOALS.protein, carbs: p.carbs ?? DEFAULT_GOALS.carbs, fat: p.fat ?? DEFAULT_GOALS.fat }; } catch { return { ...DEFAULT_GOALS }; } }
function saveGoals(goals) { localStorage.setItem(GOALS_KEY, JSON.stringify(goals)); }
function loadApiKey() { return localStorage.getItem(API_KEY_KEY) || ""; }
function saveApiKey(k) { localStorage.setItem(API_KEY_KEY, k); }
function loadBody() { try { return JSON.parse(localStorage.getItem(BODY_KEY)) || {}; } catch { return {}; } }
function saveBody(b) { localStorage.setItem(BODY_KEY, JSON.stringify(b)); }
function loadBodyTargets() {
  try {
    const raw = localStorage.getItem(BODY_TARGETS_KEY);
    if (!raw) return { ...DEFAULT_BODY_TARGETS };
    const p = JSON.parse(raw);
    const num = (v) => (typeof v === "number" && isFinite(v)) ? v : null;
    return { bodyFat: num(p?.bodyFat), muscleMass: num(p?.muscleMass) };
  } catch { return { ...DEFAULT_BODY_TARGETS }; }
}
function saveBodyTargets(b) { localStorage.setItem(BODY_TARGETS_KEY, JSON.stringify(b)); }
function sumMacros(entries) { return entries.reduce((a, e) => ({ calories: a.calories+(e.calories||0), protein: a.protein+(e.protein||0), carbs: a.carbs+(e.carbs||0), fat: a.fat+(e.fat||0) }), { calories:0, protein:0, carbs:0, fat:0 }); }

// ── Whoop helpers ────────────────────────────────────────────────────
function loadWhoopTokens() { try { return JSON.parse(localStorage.getItem(WHOOP_TOKENS_KEY)) || null; } catch { return null; } }
function saveWhoopTokens(t) { if (t) localStorage.setItem(WHOOP_TOKENS_KEY, JSON.stringify(t)); else localStorage.removeItem(WHOOP_TOKENS_KEY); }
function loadWhoopClientId() { return localStorage.getItem(WHOOP_CLIENT_ID_KEY) || ""; }
function saveWhoopClientId(id) { if (id) localStorage.setItem(WHOOP_CLIENT_ID_KEY, id); else localStorage.removeItem(WHOOP_CLIENT_ID_KEY); }
function loadWhoopRecovery() { try { return JSON.parse(localStorage.getItem(WHOOP_RECOVERY_KEY)) || {}; } catch { return {}; } }
function loadWhoopSleep() { try { return JSON.parse(localStorage.getItem(WHOOP_SLEEP_KEY)) || {}; } catch { return {}; } }
function loadWhoopCycles() { try { return JSON.parse(localStorage.getItem(WHOOP_CYCLES_KEY)) || {}; } catch { return {}; } }
function loadWhoopWorkouts() { try { return JSON.parse(localStorage.getItem(WHOOP_WORKOUTS_KEY)) || {}; } catch { return {}; } }
function loadWhoopProfile() { try { return JSON.parse(localStorage.getItem(WHOOP_PROFILE_KEY)) || null; } catch { return null; } }
function loadWhoopLastSync() { return localStorage.getItem(WHOOP_LAST_SYNC_KEY) || null; }
function loadWhoopSyncLog() { try { return JSON.parse(localStorage.getItem(WHOOP_SYNC_LOG_KEY)) || []; } catch { return []; } }
function appendWhoopSyncLog(entry) {
  const log = loadWhoopSyncLog();
  log.unshift(entry);
  localStorage.setItem(WHOOP_SYNC_LOG_KEY, JSON.stringify(log.slice(0, 10)));
}
function clearWhoopData() {
  for (const k of [WHOOP_TOKENS_KEY, WHOOP_RECOVERY_KEY, WHOOP_SLEEP_KEY, WHOOP_CYCLES_KEY, WHOOP_WORKOUTS_KEY, WHOOP_LAST_SYNC_KEY, WHOOP_SYNC_LOG_KEY, WHOOP_PROFILE_KEY]) {
    localStorage.removeItem(k);
  }
}
function whoopRedirectUri() { return window.location.origin + "/whoop-callback"; }
function randomState(len = 24) {
  const arr = new Uint8Array(len);
  window.crypto.getRandomValues(arr);
  return Array.from(arr, b => b.toString(16).padStart(2, "0")).join("").slice(0, len);
}
// Convert an ISO timestamp + Whoop timezone_offset string ("-04:00") to a local calendar date (YYYY-MM-DD).
function localDateFromOffset(iso, offset) {
  if (!iso) return null;
  const ts = Date.parse(iso);
  if (isNaN(ts)) return null;
  let offsetMs = 0;
  if (typeof offset === "string" && /^[+-]\d{2}:?\d{2}$/.test(offset)) {
    const sign = offset[0] === "-" ? -1 : 1;
    const clean = offset.replace(":", "");
    const h = parseInt(clean.slice(1, 3), 10);
    const m = parseInt(clean.slice(3, 5), 10);
    offsetMs = sign * (h * 3600 + m * 60) * 1000;
  } else {
    // Fallback: browser local offset.
    const d = new Date(ts);
    offsetMs = -d.getTimezoneOffset() * 60 * 1000;
  }
  const local = new Date(ts + offsetMs);
  return local.toISOString().slice(0, 10);
}
async function whoopTokenExchange(code, redirectUri) {
  const res = await fetch("/.netlify/functions/whoop-token-exchange", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ code, redirect_uri: redirectUri }),
  });
  if (!res.ok) throw new Error("Token exchange failed: " + res.status);
  const json = await res.json();
  return json;
}
async function whoopTokenRefresh(refreshToken, scope) {
  const res = await fetch("/.netlify/functions/whoop-token-refresh", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ refresh_token: refreshToken, scope }),
  });
  if (!res.ok) {
    const err = new Error("Token refresh failed: " + res.status);
    err.status = res.status;
    throw err;
  }
  return res.json();
}
function normalizeTokenResponse(raw) {
  if (!raw || !raw.access_token) throw new Error("Invalid token response");
  const expiresIn = Number(raw.expires_in) || 3600;
  const expiresAt = new Date(Date.now() + (expiresIn - 60) * 1000).toISOString();
  return {
    access_token: raw.access_token,
    refresh_token: raw.refresh_token,
    expires_at: expiresAt,
    scope: raw.scope || WHOOP_SCOPES,
    token_type: raw.token_type || "bearer",
  };
}
async function ensureFreshWhoopToken(tokens) {
  if (!tokens) return null;
  const expiresAt = Date.parse(tokens.expires_at);
  if (isFinite(expiresAt) && expiresAt > Date.now() + 10000) return tokens;
  if (!tokens.refresh_token) return null;
  const raw = await whoopTokenRefresh(tokens.refresh_token, tokens.scope);
  const next = normalizeTokenResponse(raw);
  // Whoop sometimes returns a rotated refresh_token; keep latest.
  if (!next.refresh_token) next.refresh_token = tokens.refresh_token;
  saveWhoopTokens(next);
  return next;
}
// Call Whoop API via the Netlify proxy. Handles one refresh + retry on 401.
async function whoopFetch(path, params = {}) {
  let tokens = loadWhoopTokens();
  if (!tokens) throw new Error("not_connected");
  try { tokens = await ensureFreshWhoopToken(tokens); }
  catch (err) {
    if (err.status === 401) { saveWhoopTokens(null); throw new Error("reconnect_required"); }
    throw err;
  }
  if (!tokens) throw new Error("reconnect_required");
  const qs = new URLSearchParams({ path });
  for (const [k, v] of Object.entries(params)) { if (v != null) qs.set(k, String(v)); }
  const url = "/.netlify/functions/whoop-fetch?" + qs.toString();
  const doFetch = (t) => fetch(url, { headers: { Authorization: "Bearer " + t.access_token } });
  let res = await doFetch(tokens);
  if (res.status === 401) {
    // Try one forced refresh.
    try {
      if (!tokens.refresh_token) throw new Error("no_refresh");
      const raw = await whoopTokenRefresh(tokens.refresh_token, tokens.scope);
      const next = normalizeTokenResponse(raw);
      if (!next.refresh_token) next.refresh_token = tokens.refresh_token;
      saveWhoopTokens(next);
      res = await doFetch(next);
    } catch {
      saveWhoopTokens(null);
      throw new Error("reconnect_required");
    }
  }
  if (res.status === 429) {
    const retryAfter = parseInt(res.headers.get("retry-after") || "0", 10);
    const err = new Error("rate_limited");
    err.rateLimited = true;
    err.retryAfter = retryAfter;
    throw err;
  }
  if (!res.ok) throw new Error("whoop_error_" + res.status);
  return res.json();
}
// Generic paginator; returns flattened records.
async function whoopPaginate(path, baseParams, { maxPages = 20 } = {}) {
  const out = [];
  let nextToken = undefined;
  let page = 0;
  while (page < maxPages) {
    const params = { ...baseParams, limit: 25 };
    if (nextToken) params.nextToken = nextToken;
    const data = await whoopFetch(path, params);
    if (Array.isArray(data?.records)) out.push(...data.records);
    nextToken = data?.next_token;
    if (!nextToken) break;
    page++;
  }
  return out;
}
// Map a Whoop record to our stored shape, keyed by wake-day.
function mapRecovery(r, cyclesById) {
  const cycle = r?.cycle_id ? cyclesById?.get(r.cycle_id) : null;
  const dateFrom = cycle?.start || r?.created_at;
  const offset = cycle?.timezone_offset;
  const date = localDateFromOffset(dateFrom, offset);
  const s = r?.score || {};
  return date ? { date, value: {
    recovery_score: s.recovery_score ?? null,
    hrv_rmssd_milli: s.hrv_rmssd_milli ?? null,
    resting_heart_rate: s.resting_heart_rate ?? null,
    spo2_percentage: s.spo2_percentage ?? null,
    skin_temp_celsius: s.skin_temp_celsius ?? null,
    cycle_id: r.cycle_id ?? null,
    sleep_id: r.sleep_id ?? null,
    raw: r,
  } } : null;
}
function mapSleep(r) {
  if (r?.nap) return null;
  const date = localDateFromOffset(r?.end, r?.timezone_offset);
  const s = r?.score || {}; const ss = s.stage_summary || {};
  const rem = ss.total_rem_sleep_time_milli || 0;
  const deep = ss.total_slow_wave_sleep_time_milli || 0;
  const light = ss.total_light_sleep_time_milli || 0;
  return date ? { date, value: {
    total_sleep_time: rem + deep + light,
    sleep_efficiency: s.sleep_efficiency_percentage ?? null,
    sleep_performance: s.sleep_performance_percentage ?? null,
    sleep_consistency: s.sleep_consistency_percentage ?? null,
    rem_sleep: rem,
    deep_sleep: deep,
    light_sleep: light,
    total_in_bed: ss.total_in_bed_time_milli ?? null,
    awake: ss.total_awake_time_milli ?? null,
    disturbances: ss.disturbance_count ?? null,
    respiratory_rate: s.respiratory_rate ?? null,
    start: r.start, end: r.end, timezone_offset: r.timezone_offset,
    raw: r,
  } } : null;
}
function mapCycle(r) {
  const date = localDateFromOffset(r?.start, r?.timezone_offset);
  const s = r?.score || {};
  return date ? { date, value: {
    day_strain: s.strain ?? null,
    kilojoule: s.kilojoule ?? null,
    average_heart_rate: s.average_heart_rate ?? null,
    max_heart_rate: s.max_heart_rate ?? null,
    cycle_id: r.id,
    start: r.start, end: r.end, timezone_offset: r.timezone_offset,
    raw: r,
  } } : null;
}
function mapWorkout(r) {
  const date = localDateFromOffset(r?.start, r?.timezone_offset);
  const s = r?.score || {}; const zd = s.zone_durations || {};
  return date ? { date, value: {
    id: r.id,
    sport_id: r.sport_id ?? null,
    sport_name: r.sport_name || null,
    start: r.start, end: r.end, timezone_offset: r.timezone_offset,
    strain: s.strain ?? null,
    kilojoule: s.kilojoule ?? null,
    average_heart_rate: s.average_heart_rate ?? null,
    max_heart_rate: s.max_heart_rate ?? null,
    zone_duration_zero: zd.zone_zero_milli ?? null,
    zone_duration_one: zd.zone_one_milli ?? null,
    zone_duration_two: zd.zone_two_milli ?? null,
    zone_duration_three: zd.zone_three_milli ?? null,
    zone_duration_four: zd.zone_four_milli ?? null,
    zone_duration_five: zd.zone_five_milli ?? null,
    raw: r,
  } } : null;
}
async function syncWhoop({ backfillDays = 2 } = {}) {
  const startedAt = new Date();
  const end = new Date();
  const start = new Date(end.getTime() - backfillDays * 86400000);
  const params = { start: start.toISOString(), end: end.toISOString() };
  const counts = { recovery: 0, sleep: 0, cycles: 0, workouts: 0 };
  let profileFetched = false;
  try {
    // Profile (cheap, nice to cache for "Connected as Sam")
    if (!loadWhoopProfile()) {
      try {
        const prof = await whoopFetch("/v2/user/profile/basic", {});
        if (prof) { localStorage.setItem(WHOOP_PROFILE_KEY, JSON.stringify(prof)); profileFetched = true; }
      } catch {}
    }
    // Fetch cycles first so recovery can join for correct date key.
    const cycles = await whoopPaginate("/v2/cycle", params);
    const cyclesById = new Map(cycles.map(c => [c.id, c]));
    const cyclesStore = loadWhoopCycles();
    for (const c of cycles) { const m = mapCycle(c); if (m) { cyclesStore[m.date] = m.value; counts.cycles++; } }
    localStorage.setItem(WHOOP_CYCLES_KEY, JSON.stringify(cyclesStore));
    // Recovery
    const recovery = await whoopPaginate("/v2/recovery", params);
    const recoveryStore = loadWhoopRecovery();
    for (const r of recovery) { const m = mapRecovery(r, cyclesById); if (m) { recoveryStore[m.date] = m.value; counts.recovery++; } }
    localStorage.setItem(WHOOP_RECOVERY_KEY, JSON.stringify(recoveryStore));
    // Sleep
    const sleep = await whoopPaginate("/v2/activity/sleep", params);
    const sleepStore = loadWhoopSleep();
    for (const s of sleep) { const m = mapSleep(s); if (m) { sleepStore[m.date] = m.value; counts.sleep++; } }
    localStorage.setItem(WHOOP_SLEEP_KEY, JSON.stringify(sleepStore));
    // Workouts — multiple per day; dedup by id
    const workouts = await whoopPaginate("/v2/activity/workout", params);
    const workoutsStore = loadWhoopWorkouts();
    for (const w of workouts) {
      const m = mapWorkout(w); if (!m) continue;
      const arr = workoutsStore[m.date] || [];
      const idx = arr.findIndex(x => x.id === m.value.id);
      if (idx >= 0) arr[idx] = m.value; else arr.push(m.value);
      arr.sort((a, b) => (a.start || "").localeCompare(b.start || ""));
      workoutsStore[m.date] = arr;
      counts.workouts++;
    }
    localStorage.setItem(WHOOP_WORKOUTS_KEY, JSON.stringify(workoutsStore));

    const finishedAt = new Date().toISOString();
    localStorage.setItem(WHOOP_LAST_SYNC_KEY, finishedAt);
    appendWhoopSyncLog({ ts: finishedAt, status: "success", counts, backfillDays });
    return { ok: true, counts, profileFetched };
  } catch (err) {
    appendWhoopSyncLog({ ts: new Date().toISOString(), status: "error", error: String(err?.message || err), backfillDays });
    throw err;
  }
}

const EXPORT_KEYS = [HISTORY_KEY, FAV_KEY, GOALS_KEY, BODY_KEY, BODY_TARGETS_KEY, THEME_KEY, WHOOP_RECOVERY_KEY, WHOOP_SLEEP_KEY, WHOOP_CYCLES_KEY, WHOOP_WORKOUTS_KEY, WHOOP_LAST_SYNC_KEY, WHOOP_PROFILE_KEY, WHOOP_CLIENT_ID_KEY];
function exportBackup() {
  const data = {};
  for (const k of EXPORT_KEYS) { const v = localStorage.getItem(k); if (v != null) data[k] = v; }
  const payload = { app: "health-log", version: 1, exportedAt: new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "health-log-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function importBackup(file) {
  const text = await file.text();
  const parsed = JSON.parse(text);
  const data = parsed?.data;
  if (!data || typeof data !== "object") throw new Error("Not a Health Log backup file");
  let restored = 0;
  for (const [k, v] of Object.entries(data)) {
    if (EXPORT_KEYS.includes(k) && typeof v === "string") { localStorage.setItem(k, v); restored++; }
  }
  if (!restored) throw new Error("Backup file contained no recognized data");
  return restored;
}

async function lookupBarcode(code) {
  const url = "https://world.openfoodfacts.org/api/v2/product/" + encodeURIComponent(code) + ".json?fields=product_name,brands,serving_size,serving_quantity,nutriments,image_small_url";
  const res = await fetch(url);
  if (!res.ok) throw new Error("Lookup failed (" + res.status + ")");
  const data = await res.json();
  if (data.status !== 1 || !data.product) throw new Error("not-found");
  const p = data.product;
  const n = p.nutriments || {};
  const name = [p.brands, p.product_name].filter(Boolean).join(" — ") || p.product_name || "Unknown product";
  const calories100 = n["energy-kcal_100g"] ?? (n["energy_100g"] ? n["energy_100g"] / 4.184 : null);
  return {
    barcode: code,
    name,
    image: p.image_small_url || null,
    servingSize: p.serving_quantity ? parseFloat(p.serving_quantity) : null,
    servingSizeLabel: p.serving_size || null,
    per100: {
      calories: calories100,
      protein: n["proteins_100g"] ?? null,
      carbs: n["carbohydrates_100g"] ?? null,
      fat: n["fat_100g"] ?? null,
    },
  };
}

function useThemeMode() {
  const [mode, setMode] = useState(() => localStorage.getItem(THEME_KEY) || "auto");
  const [systemDark, setSystemDark] = useState(() => window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const h = (ev) => setSystemDark(ev.matches);
    if (mq.addEventListener) mq.addEventListener("change", h);
    else mq.addListener?.(h);
    return () => { if (mq.removeEventListener) mq.removeEventListener("change", h); else mq.removeListener?.(h); };
  }, []);
  useEffect(() => { localStorage.setItem(THEME_KEY, mode); }, [mode]);
  const isDark = mode === "auto" ? systemDark : mode === "dark";
  return { theme: isDark ? themes.dark : themes.light, mode, setMode, isDark };
}

// ── Ring ──────────────────────────────────────────────────────────────
// mode: "target" (floor — hit or exceed = good, shows ✓ at/above max) or
//       "limit"  (ceiling — stay under; over = red, no ✓ at full).
function Ring({ value, max, color, label, unit, mode = "limit" }) {
  const t = useTheme();
  const size = 88, stroke = 8, r = (size-stroke)/2, circ = 2*Math.PI*r;
  const pct = max > 0 ? Math.min(value/max, 1) : 0;
  const over = value > max, ac = over ? t.danger : color;
  const targetHit = mode === "target" && max > 0 && value >= max;
  const rem = Math.max(0, max - Math.round(value));
  const unitLabel = unit || (label === "Calories" ? "" : "g");
  let subLabel;
  if (mode === "target") {
    subLabel = over ? "+"+(Math.round(value)-max)+unitLabel : targetHit ? "goal hit" : rem+unitLabel+" to go";
  } else {
    subLabel = over ? "+"+(Math.round(value)-max)+unitLabel+" over" : rem+unitLabel+" left";
  }
  const subColor = over ? t.danger : targetHit ? color : t.textMuted;
  return e("div", { style: { textAlign: "center", width: size } },
    e("div", { style: { position: "relative", width: size, height: size } },
      e("svg", { width: size, height: size, style: { transform: "rotate(-90deg)" } },
        e("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: color+"1a", strokeWidth: stroke }),

  );
}

// ── Chart helpers ────────────────────────────────────────────────────
function buildMacroSeries(history, days, key) {
  const end = new Date();
  const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(end);
    d.setDate(end.getDate() - i);
    const dk = dateKey(d);
    const entries = history[dk];
    if (entries && entries.length) {
      const total = entries.reduce((a, en) => a + (en[key] || 0), 0);
      out.push({ date: dk, value: total });
    } else {
      out.push({ date: dk, value: null });
    }
  }
  return out;
}
function buildBodySeries(body, days, key) {
  const end = new Date();
  const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(end);
    d.setDate(end.getDate() - i);
    const dk = dateKey(d);
    const v = body[dk]?.[key];
    out.push({ date: dk, value: (typeof v === "number" && !isNaN(v)) ? v : null });
  }
  return out;
}
function movingAverage(series, window) {
  return series.map((_, i) => {
    let sum = 0, n = 0;
    for (let j = Math.max(0, i - window + 1); j <= i; j++) {
      if (series[j].value != null) { sum += series[j].value; n++; }
    }
    return n > 0 ? sum / n : null;
  });
}
function seriesStats(series) {
  const vals = series.map(p => p.value).filter(v => v != null);
  if (!vals.length) return { count: 0 };
  const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
  const first = vals[0], last = vals[vals.length-1];
  return { count: vals.length, avg, first, last, change: last - first };
}

  }
  const goalVal = (typeof goal === "number" && isFinite(goal)) ? goal : null;
  const maxV = Math.max(...vals, goalVal != null ? goalVal : -Infinity);
  const minV = Math.min(...vals, goalVal != null ? goalVal : Infinity);
  const rng = Math.max(maxV - minV, Math.max(1, maxV * 0.08));
  const hi = maxV + rng * 0.12;
  const lo = Math.max(0, minV - rng * 0.12);
  const xAt = (i) => PAD_L + (series.length > 1 ? (i / (series.length - 1)) : 0.5) * (W - PAD_L - PAD_R);

  let dailyPath = "";
  series.forEach((p, i) => {
    if (p.value == null) return;
    const prev = i > 0 ? series[i-1].value : null;
    dailyPath += (prev == null ? "M" : "L") + xAt(i).toFixed(1) + "," + yAt(p.value).toFixed(1) + " ";
  });

  let maPath = "";
  ma.forEach((v, i) => {
    if (v == null) return;
    const prev = i > 0 ? ma[i-1] : null;
    maPath += (prev == null ? "M" : "L") + xAt(i).toFixed(1) + "," + yAt(v).toFixed(1) + " ";
  });

    goalVal != null && e("line", { x1: PAD_L, x2: W - PAD_R, y1: yAt(goalVal), y2: yAt(goalVal), stroke: t.textMuted, strokeDasharray: "3 4", strokeWidth: 0.8, opacity: 0.7 }),
    dailyPath && e("path", { d: dailyPath, fill: "none", stroke: color, strokeOpacity: 0.28, strokeWidth: 1.2, strokeLinecap: "round", strokeLinejoin: "round" }),
    maPath && e("path", { d: maPath, fill: "none", stroke: color, strokeWidth: 2.2, strokeLinecap: "round", strokeLinejoin: "round", style: { filter: "drop-shadow(0 1px 2px "+color+"55)" } }),
    series.map((p, i) => p.value != null ? e("circle", { key: i, cx: xAt(i), cy: yAt(p.value), r: 1.6, fill: color, fillOpacity: 0.85 }) : null),
    e("text", { x: 2, y: yAt(hi) + 3, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Sans', sans-serif", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(hi)),
    e("text", { x: 2, y: yAt(lo) + 3, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Sans', sans-serif", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(lo)),
    firstDate && e("text", { x: PAD_L, y: H - 8, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace" }, fmt(firstDate)),
    midDate && series.length > 6 && e("text", { x: xAt(midIdx), y: H - 8, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace", textAnchor: "middle" }, fmt(midDate)),
    lastDate && e("text", { x: W - PAD_R, y: H - 8, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace", textAnchor: "end" }, fmt(lastDate)),
    goalVal != null && e("text", { x: W - PAD_R, y: yAt(goalVal) - 4, fontSize: 8, fill: t.textMuted, textAnchor: "end", fontFamily: "'DM Mono', monospace", letterSpacing: 0.4 }, "GOAL " + fmtNum(goalVal))

// ── Dual Line Chart (two independent y-scales) ───────────────────────
function DualLineChart({ seriesA, seriesB, t }) {
  const W = 360, H = 138, PAD_L = 34, PAD_R = 34, PAD_T = 16, PAD_B = 28;
  const valsA = seriesA.data.map(p => p.value).filter(v => v != null);
  const valsB = seriesB.data.map(p => p.value).filter(v => v != null);
  const goalA = typeof seriesA.goal === "number" && isFinite(seriesA.goal) ? seriesA.goal : null;
  const goalB = typeof seriesB.goal === "number" && isFinite(seriesB.goal) ? seriesB.goal : null;
  if (!valsA.length && !valsB.length) {
    return e("div", { style: { height: H, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: t.textMuted, fontFamily: "'DM Mono', monospace", letterSpacing: 0.5 } }, "No data yet");
  }
  const scale = (vals, goal) => {
    const candidates = [...vals];
    if (goal != null) candidates.push(goal);
    if (!candidates.length) return { lo: 0, hi: 1 };
    const mn = Math.min(...candidates), mx = Math.max(...candidates);
    const rng = Math.max(mx - mn, Math.max(0.5, mx * 0.05));
    return { lo: Math.max(0, mn - rng * 0.15), hi: mx + rng * 0.15 };
  };
  const sA = scale(valsA, goalA), sB = scale(valsB, goalB);
  const len = Math.max(seriesA.data.length, seriesB.data.length);
  const xAt = (i) => PAD_L + (len > 1 ? (i / (len - 1)) : 0.5) * (W - PAD_L - PAD_R);
  const yA = (v) => PAD_T + (1 - (v - sA.lo) / Math.max(sA.hi - sA.lo, 1)) * (H - PAD_T - PAD_B);
  const yB = (v) => PAD_T + (1 - (v - sB.lo) / Math.max(sB.hi - sB.lo, 1)) * (H - PAD_T - PAD_B);

  const pathFor = (data, yFn) => {
    let daily = "";
    data.forEach((p, i) => {
      if (p.value == null) return;
      const prev = i > 0 ? data[i-1].value : null;
      daily += (prev == null ? "M" : "L") + xAt(i).toFixed(1) + "," + yFn(p.value).toFixed(1) + " ";
    });
    const ma = movingAverage(data, 7);
    let smooth = "";
    ma.forEach((v, i) => {
      if (v == null) return;
      const prev = i > 0 ? ma[i-1] : null;
      smooth += (prev == null ? "M" : "L") + xAt(i).toFixed(1) + "," + yFn(v).toFixed(1) + " ";
    });
    return { daily, smooth };
  };
  const pA = pathFor(seriesA.data, yA);
  const pB = pathFor(seriesB.data, yB);

  const base = seriesA.data.length ? seriesA.data : seriesB.data;
  const firstDate = base[0]?.date, lastDate = base[base.length-1]?.date;
  const midIdx = Math.floor(base.length / 2);
  const midDate = base[midIdx]?.date;
  const fmt = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
  const fmtNum = (v) => Math.abs(v) >= 100 ? Math.round(v).toString() : v.toFixed(1);

  return e("svg", { viewBox: "0 0 "+W+" "+H, width: "100%", height: "auto", style: { display: "block", overflow: "visible" } },
    e("line", { x1: PAD_L, x2: W - PAD_R, y1: H - PAD_B, y2: H - PAD_B, stroke: t.border, strokeWidth: 0.6 }),
    goalA != null && e("line", { x1: PAD_L, x2: W - PAD_R, y1: yA(goalA), y2: yA(goalA), stroke: seriesA.color, strokeDasharray: "3 4", strokeWidth: 1, opacity: 0.65 }),
    goalA != null && e("text", { x: PAD_L + 2, y: yA(goalA) - 3, fontSize: 8, fill: seriesA.color, fontFamily: "'DM Mono', monospace", letterSpacing: 0.4, opacity: 0.85 }, "TARGET " + fmtNum(goalA)),
    goalB != null && e("line", { x1: PAD_L, x2: W - PAD_R, y1: yB(goalB), y2: yB(goalB), stroke: seriesB.color, strokeDasharray: "3 4", strokeWidth: 1, opacity: 0.65 }),
    goalB != null && e("text", { x: W - PAD_R - 2, y: yB(goalB) - 3, fontSize: 8, fill: seriesB.color, fontFamily: "'DM Mono', monospace", letterSpacing: 0.4, opacity: 0.85, textAnchor: "end" }, "TARGET " + fmtNum(goalB)),
    pA.daily && e("path", { d: pA.daily, fill: "none", stroke: seriesA.color, strokeOpacity: 0.28, strokeWidth: 1.2, strokeLinecap: "round", strokeLinejoin: "round" }),
    pB.daily && e("path", { d: pB.daily, fill: "none", stroke: seriesB.color, strokeOpacity: 0.28, strokeWidth: 1.2, strokeLinecap: "round", strokeLinejoin: "round" }),
    pA.smooth && e("path", { d: pA.smooth, fill: "none", stroke: seriesA.color, strokeWidth: 2.2, strokeLinecap: "round", strokeLinejoin: "round", style: { filter: "drop-shadow(0 1px 2px "+seriesA.color+"55)" } }),
    pB.smooth && e("path", { d: pB.smooth, fill: "none", stroke: seriesB.color, strokeWidth: 2.2, strokeLinecap: "round", strokeLinejoin: "round", style: { filter: "drop-shadow(0 1px 2px "+seriesB.color+"55)" } }),
    seriesA.data.map((p, i) => p.value != null ? e("circle", { key: "a"+i, cx: xAt(i), cy: yA(p.value), r: 1.6, fill: seriesA.color, fillOpacity: 0.85 }) : null),
    seriesB.data.map((p, i) => p.value != null ? e("circle", { key: "b"+i, cx: xAt(i), cy: yB(p.value), r: 1.6, fill: seriesB.color, fillOpacity: 0.85 }) : null),
    valsA.length > 0 && e("text", { x: 2, y: yA(sA.hi) + 3, fontSize: 9, fill: seriesA.color, fontFamily: "'DM Sans', sans-serif", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(sA.hi)),
    valsA.length > 0 && e("text", { x: 2, y: yA(sA.lo) + 3, fontSize: 9, fill: seriesA.color, fontFamily: "'DM Sans', sans-serif", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(sA.lo)),
    valsB.length > 0 && e("text", { x: W - 2, y: yB(sB.hi) + 3, fontSize: 9, fill: seriesB.color, fontFamily: "'DM Sans', sans-serif", textAnchor: "end", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(sB.hi)),
    valsB.length > 0 && e("text", { x: W - 2, y: yB(sB.lo) + 3, fontSize: 9, fill: seriesB.color, fontFamily: "'DM Sans', sans-serif", textAnchor: "end", style: { fontVariantNumeric: "tabular-nums" } }, fmtNum(sB.lo)),
    firstDate && e("text", { x: PAD_L, y: H - 12, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace" }, fmt(firstDate)),
    midDate && base.length > 6 && e("text", { x: xAt(midIdx), y: H - 12, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace", textAnchor: "middle" }, fmt(midDate)),
    lastDate && e("text", { x: W - PAD_R, y: H - 12, fontSize: 9, fill: t.textMuted, fontFamily: "'DM Mono', monospace", textAnchor: "end" }, fmt(lastDate))
  );
}

function buildWhoopSeries(store, days, key) {
  const end = new Date();
  const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(end);
    d.setDate(end.getDate() - i);
    const dk = dateKey(d);
    const rec = store[dk];
    const v = rec?.[key];
    out.push({ date: dk, value: (typeof v === "number" && isFinite(v)) ? v : null });
  }
  return out;
}

// ── Barcode Scanner ──────────────────────────────────────────────────
function BarcodeScanner({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const [status, setStatus] = useState("Starting camera…");
  const [error, setError] = useState("");

  useEffect(() => {
    let cancelled = false;
    async function start() {
      if (typeof window.BarcodeDetector === "undefined") {
        setError("Barcode scanning isn't supported in this browser. Use Chrome, Edge, or Safari 17+.");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } });
        if (cancelled) { stream.getTracks().forEach(tr => tr.stop()); return; }
        streamRef.current = stream;
        const v = videoRef.current;
        if (v) {
          v.srcObject = stream;
          v.setAttribute("playsinline", "true");
          v.muted = true;
          try { await v.play(); } catch {}
        }
        setStatus("Point at a barcode");
        const detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128", "code_39"] });
        const tick = async () => {
          if (cancelled || !videoRef.current) return;
          try {
            const bars = await detector.detect(videoRef.current);
            if (bars && bars.length && bars[0].rawValue) {
              cancelled = true;
              if (navigator.vibrate) navigator.vibrate(70);
              if (streamRef.current) streamRef.current.getTracks().forEach(tr => tr.stop());
              onDetect(bars[0].rawValue);
              return;
            }
          } catch {}
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
      } catch (err) {
        if (cancelled) return;
        setError("Couldn't access camera. Check permissions and try again.");
      }
    }
    start();
    return () => {
      cancelled = true;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(tr => tr.stop());
    };
  }, [onDetect]);

  return e("div", { style: { position: "fixed", inset: 0, zIndex: 200, background: "#000", overflow: "hidden" } },
    e("video", { ref: videoRef, autoPlay: true, muted: true, playsInline: true, style: { position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", background: "#000" } }),
    e("div", { style: { position: "absolute", inset: 0, background: "radial-gradient(ellipse 70% 55% at center, transparent 0%, transparent 45%, rgba(0,0,0,0.55) 75%)", pointerEvents: "none" } }),
    !error && e("div", { style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", width: "70%", maxWidth: 300, aspectRatio: "16 / 11", border: "2px solid rgba(255,255,255,0.9)", borderRadius: 20, pointerEvents: "none" } }),
    e("div", { style: { position: "absolute", top: "calc(env(safe-area-inset-top, 0px) + 16px)", left: 16, right: 16, display: "flex", justifyContent: "space-between", alignItems: "center" } },
      e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: 22, color: "#fff", fontWeight: 700, textShadow: "0 2px 8px rgba(0,0,0,0.6)" } }, "Scan Barcode"),
      e("button", { onClick: onClose, style: { width: 40, height: 40, borderRadius: 20, background: "rgba(0,0,0,0.45)", border: "1px solid rgba(255,255,255,0.3)", color: "#fff", fontSize: 22, cursor: "pointer", lineHeight: 1, padding: 0, backdropFilter: "blur(6px)" } }, "×")
    ),
    e("div", { style: { position: "absolute", bottom: "calc(env(safe-area-inset-bottom, 0px) + 40px)", left: 20, right: 20, textAlign: "center", color: "#fff" } },
      error
        ? e("div", { style: { fontSize: 13, lineHeight: 1.55, fontFamily: "'DM Sans', sans-serif", padding: "14px 18px", background: "rgba(184,84,84,0.35)", border: "1px solid rgba(255,255,255,0.25)", borderRadius: 14, backdropFilter: "blur(6px)" } }, error)

    )

// ── Whoop formatters + cards ─────────────────────────────────────────
function formatDurationMs(ms) {
  if (ms == null || !isFinite(ms) || ms < 0) return "—";
  const total = Math.round(ms / 60000);
  const h = Math.floor(total / 60);
  const m = total % 60;
  if (h === 0) return m + "m";
  return h + "h " + String(m).padStart(2, "0") + "m";
}
function formatRelativeSync(iso) {
  if (!iso) return null;
  const ts = Date.parse(iso);
  if (!isFinite(ts)) return null;
  const diff = Date.now() - ts;
  if (diff < 60000) return "just now";
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + "m ago";
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + "h ago";
  const days = Math.floor(hours / 24);
  return days + "d ago";
}
function recoveryColor(score, t) {
  if (score == null) return t.textMuted;
  if (score < 34) return t.danger;
  if (score < 67) return t.carb;
  return t.pro;
}

      onClose: () => setShowSettings(false),
      onSave: (g) => { setGoals(g); setShowSettings(false); },
      onClearKey,
      whoopConnected, whoopProfile,
      whoopClientId, setWhoopClientId,
      onConnectWhoop: beginWhoopOAuth,
      onDisconnectWhoop: disconnectWhoop,
      onRebackfillWhoop: () => runWhoopSync({ backfillDays: 60 }),
      whoopSyncing,
    }),
    showFavs && e(FavoritesPanel, { favs, onClose: () => setShowFavs(false), onLog: logFavorite, onRemove: removeFavorite }),
    showHistory && e(HistoryPanel, { history, goals, todayKey, onClose: () => setShowHistory(false) }),
    showTrends && e(TrendsPanel, { history, body, goals, bodyTargets, apiKey, onClose: () => setShowTrends(false), onSaveBody: saveBodyEntry, whoopRecovery, whoopSleep, whoopCycles, whoopConnected }),
    showScanner && e(BarcodeScanner, { onDetect: handleBarcodeDetected, onClose: () => setShowScanner(false) }),
    barcodeState && e(BarcodeConfirm, { state: barcodeState, onLog: logBarcode, onCancel: () => setBarcodeState(null), onRetry: () => { setBarcodeState(null); setShowScanner(true); } }),
    oauthResult && oauthResult.phase === "error" && e(WhoopOAuthErrorDialog, { message: oauthResult.message, onClose: clearOauthResult, onRetry: () => { clearOauthResult(); setShowSettings(true); } }),
    showBackfillPrompt && e(BackfillPrompt, {
      onAccept: async () => { closeBackfillPrompt(); await runWhoopSync({ backfillDays: 60 }); },
      onSkip: async () => { closeBackfillPrompt(); await runWhoopSync({ backfillDays: 2 }); }
    })
  );
}

function BackfillPrompt({ onAccept, onSkip }) {
  const t = useTheme();
  return e("div", { style: { position: "fixed", inset: 0, zIndex: 210, display: "flex", alignItems: "flex-end", justifyContent: "center" } },
    e("div", { onClick: onSkip, style: { position: "absolute", inset: 0, background: t.overlay, backdropFilter: "blur(10px)" } }),
    e("div", { className: "sheet-anim", style: { position: "relative", width: "100%", maxWidth: 440, background: t.sheet, borderRadius: "24px 24px 0 0", padding: "22px 24px calc(34px + 16px)", border: "1px solid "+t.sheetBorder, borderBottom: "none" } },
      e("div", { style: { width: 40, height: 4, borderRadius: 2, background: t.border, margin: "0 auto 18px" } }),
      e("div", { style: { fontSize: 10, color: t.textMuted, letterSpacing: 1.6, textTransform: "uppercase", fontWeight: 600, fontFamily: "'DM Sans', sans-serif", marginBottom: 8 } }, "Whoop connected"),
      e("h2", { style: { margin: 0, fontSize: 24, fontFamily: "'Playfair Display', serif", fontWeight: 700, color: t.text, lineHeight: 1.25, marginBottom: 8 } }, "Load the last 60 days?"),
      e("p", { style: { fontSize: 13, color: t.textDim, lineHeight: 1.6, fontFamily: "'DM Sans', sans-serif", marginBottom: 18 } }, "We'll pull recovery, sleep, strain, and workouts back to 60 days ago so your trends fill in immediately. Otherwise we'll just sync the last couple of days."),
      e("div", { style: { display: "flex", gap: 10 } },
        e("button", { onClick: onSkip, className: "tap", style: { flex: 1, padding: "13px 14px", background: "none", border: "1px solid "+t.border, borderRadius: 12, color: t.textDim, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3 } }, "Just the last 2 days"),
        e("button", { onClick: onAccept, className: "tap", style: { flex: 1.3, padding: "13px 14px", background: t.accent, border: "none", borderRadius: 12, color: t.onAccent, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3, boxShadow: "0 4px 14px "+t.shadow } }, "Load 60 days")
      )
    )
  );
}

function WhoopOAuthErrorDialog({ message, onClose, onRetry }) {
  const t = useTheme();
  return e("div", { style: { position: "fixed", inset: 0, zIndex: 210, display: "flex", alignItems: "flex-end", justifyContent: "center" } },
    e("div", { onClick: onClose, style: { position: "absolute", inset: 0, background: t.overlay, backdropFilter: "blur(10px)" } }),
    e("div", { className: "sheet-anim", style: { position: "relative", width: "100%", maxWidth: 440, background: t.sheet, borderRadius: "24px 24px 0 0", padding: "22px 24px calc(34px + 16px)", border: "1px solid "+t.sheetBorder, borderBottom: "none" } },
      e("div", { style: { width: 40, height: 4, borderRadius: 2, background: t.border, margin: "0 auto 18px" } }),
      e("div", { style: { fontSize: 10, color: t.danger, letterSpacing: 1.6, textTransform: "uppercase", fontWeight: 600, fontFamily: "'DM Sans', sans-serif", marginBottom: 8 } }, "Whoop connection failed"),
      e("p", { style: { fontSize: 13, color: t.textDim, lineHeight: 1.6, fontFamily: "'DM Sans', sans-serif", marginBottom: 18 } }, message || "Something went wrong during authorization."),
      e("div", { style: { display: "flex", gap: 10 } },
        e("button", { onClick: onClose, className: "tap", style: { flex: 1, padding: "13px 14px", background: "none", border: "1px solid "+t.border, borderRadius: 12, color: t.textDim, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3 } }, "Close"),
        e("button", { onClick: onRetry, className: "tap", style: { flex: 1, padding: "13px 14px", background: t.accent, border: "none", borderRadius: 12, color: t.onAccent, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3, boxShadow: "0 4px 14px "+t.shadow } }, "Open Settings")
      )
    )
  );
}

// ── Root ──────────────────────────────────────────────────────────────
function App() {
  const { theme, mode, setMode } = useThemeMode();
  const [apiKey, setApiKey] = useState(() => loadApiKey());
  const [oauthResult, setOauthResult] = useState(null); // { phase: "exchanging"|"success"|"error", message? }
  const [showBackfillPrompt, setShowBackfillPrompt] = useState(false);
  useEffect(() => {
    document.body.style.background = theme.bg;
    document.body.style.color = theme.text;
    document.documentElement.style.setProperty("--placeholder", theme.textFaint);
    document.documentElement.style.setProperty("--grain-opacity", String(theme.grainOpacity));
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) metaTheme.setAttribute("content", theme.bg);
  }, [theme]);
  // Handle Whoop OAuth callback on app load.
  useEffect(() => {
    if (!window.location.pathname.startsWith("/whoop-callback")) return;
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const errorParam = params.get("error");
    const storedState = sessionStorage.getItem(WHOOP_OAUTH_STATE_KEY);
    // Always strip the URL so reloads don't re-trigger.
    const cleanUrl = window.location.origin + "/";
    if (errorParam) {
      setOauthResult({ phase: "error", message: "Whoop returned: " + errorParam });
      window.history.replaceState({}, "", cleanUrl);
      return;
    }
    if (!code) {
      window.history.replaceState({}, "", cleanUrl);
      return;
    }
    if (!state || !storedState || state !== storedState) {
      setOauthResult({ phase: "error", message: "State mismatch — possible CSRF. Try connecting again." });
      sessionStorage.removeItem(WHOOP_OAUTH_STATE_KEY);
      window.history.replaceState({}, "", cleanUrl);
      return;
    }
    sessionStorage.removeItem(WHOOP_OAUTH_STATE_KEY);
    setOauthResult({ phase: "exchanging" });
    (async () => {
      try {
        const raw = await whoopTokenExchange(code, whoopRedirectUri());
        const tokens = normalizeTokenResponse(raw);
        saveWhoopTokens(tokens);
        window.history.replaceState({}, "", cleanUrl);
        setOauthResult({ phase: "success" });
        setShowBackfillPrompt(true);
      } catch (err) {
        window.history.replaceState({}, "", cleanUrl);
        setOauthResult({ phase: "error", message: err?.message || "Token exchange failed" });
      }
    })();
  }, []);
  return e(ThemeContext.Provider, { value: theme },
    !apiKey
      ? e(SetupScreen, { onSave: setApiKey })
      : e(MacroTracker, {
          apiKey,
          onClearKey: () => { localStorage.removeItem(API_KEY_KEY); setApiKey(""); },
          themeMode: mode,
          setThemeMode: setMode,
          oauthResult,
          clearOauthResult: () => setOauthResult(null),
          showBackfillPrompt,
          closeBackfillPrompt: () => setShowBackfillPrompt(false),
        })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
