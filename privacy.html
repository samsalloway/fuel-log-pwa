<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>Health Log — Privacy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: radial-gradient(ellipse 100% 60% at 50% 0%, #F5EADB 0%, #FAF7F2 50%, #F4EEE4 100%);
    color: #2B2A26;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.65;
    padding: calc(env(safe-area-inset-top, 0px) + 32px) 28px calc(env(safe-area-inset-bottom, 0px) + 48px);
    display: flex;
    justify-content: center;
  }
  @media (prefers-color-scheme: dark) {
    body { background: radial-gradient(ellipse 100% 60% at 50% 0%, #221A13 0%, #14110E 50%, #0F0D0B 100%); color: #EFEAE1; }
    a { color: #E89B73; }
    .back { color: rgba(239,234,225,0.6); }
    .back:hover { color: #EFEAE1; }
    hr { border-color: rgba(239,234,225,0.12); }
  }
  main { max-width: 520px; width: 100%; }
  .crest { font-size: 36px; margin-bottom: 16px; }
  h1 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 34px; letter-spacing: -0.6px; margin-bottom: 6px; }
  .eyebrow { font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(43,42,38,0.55); margin-bottom: 20px; }
  @media (prefers-color-scheme: dark) { .eyebrow { color: rgba(239,234,225,0.55); } }
  hr { border: none; border-top: 1px solid rgba(43,42,38,0.1); margin: 26px 0; }
  p { font-size: 15px; margin-bottom: 14px; }
  .muted { color: rgba(43,42,38,0.58); font-size: 13px; }
  @media (prefers-color-scheme: dark) { .muted { color: rgba(239,234,225,0.58); } }
  .back { display: inline-flex; align-items: center; gap: 6px; margin-top: 28px; font-size: 13px; color: rgba(43,42,38,0.6); text-decoration: none; font-weight: 500; letter-spacing: 0.2px; }
  .back:hover { color: #2B2A26; }
  a { color: #C97B4F; }
</style>
</head>
<body>
<main>
  <div class="crest">🔥</div>
  <div class="eyebrow">Privacy</div>
  <h1>Health Log</h1>
  <hr>
  <p>This is a personal app used only by Sam Salloway.</p>
  <p>Data retrieved from Whoop is stored locally in the user's browser and is not shared with any third party.</p>
  <p class="muted">If you have questions, reach out to the email associated with this app.</p>
  <a href="/" class="back">← Back to Health Log</a>
</main>
</body>
</html>
